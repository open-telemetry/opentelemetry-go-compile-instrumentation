name: Conventional Commit

on:
  workflow_run:
    workflows: ["Conventional Commit Trigger"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download PR metadata
        id: download
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: conventional-commit-metadata
          path: tmp
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read PR metadata
        id: metadata
        run: |
          if [ ! -f tmp/pr-number.txt ]; then
            echo "::error::PR number file not found in artifact"
            exit 1
          fi
          PR_NUMBER=$(tr -d '[:space:]' < tmp/pr-number.txt)
          if ! echo "$PR_NUMBER" | grep -qE '^[0-9]+$'; then
            echo "::error::Invalid PR number: $PR_NUMBER"
            exit 1
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      # Security: Since this workflow runs in the privileged workflow_run context,
      # it checks out only base-branch code from the target repository.
      - name: Check out base code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Setup go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c  # v6.1.0
        with:
          cache-dependency-path: "**/go.mod"
          go-version-file: go.mod

      - name: Run conventionalcommit validator
        run: |
          go -C .github/tools/conventionalcommit run . \
            -owner="${{ github.repository_owner }}" \
            -repo="${{ github.event.repository.name }}" \
            -pr="${{ steps.metadata.outputs.pr_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


