name: Conventional Commit

on:
  workflow_run:
    workflows: ["Conventional Commit Trigger"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Verify workflow origin
        if: github.event.workflow_run.event != 'pull_request'
        run: |
          echo "::error::This workflow must only be triggered by a pull_request event, got: ${{ github.event.workflow_run.event }}"
          exit 1

      - name: Download PR metadata
        id: download
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: conventional-commit-metadata
          path: tmp
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read PR metadata
        id: metadata
        env:
          EXPECTED_PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          if [ -z "$EXPECTED_PR_NUMBER" ]; then
            echo "::error::workflow_run payload did not include an associated pull request"
            exit 1
          fi

          if [ ! -f tmp/pr-number.txt ]; then
            echo "::error::PR number file not found in artifact"
            exit 1
          fi
          PR_NUMBER=$(tr -d '[:space:]' < tmp/pr-number.txt)
          if ! echo "$PR_NUMBER" | grep -qE '^[0-9]+$'; then
            echo "::error::Invalid PR number: $PR_NUMBER"
            exit 1
          fi
          if [ "$PR_NUMBER" != "$EXPECTED_PR_NUMBER" ]; then
            echo "::error::Artifact PR number $PR_NUMBER does not match workflow_run PR number $EXPECTED_PR_NUMBER"
            exit 1
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      # Security: this workflow runs in the privileged workflow_run context.
      # A bare checkout (no ref/sha override) checks out the repository's
      # default branch — never the fork's pull-request branch.  Do NOT add
      # a ref or sha input here; doing so could check out untrusted fork code
      # and allow secret exfiltration.
      - name: Check out base-branch code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          persist-credentials: false

      - name: Setup go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c  # v6.1.0
        with:
          cache-dependency-path: "**/go.mod"
          go-version-file: go.mod

      - name: Run conventionalcommit validator
        run: |
          go -C .github/tools/conventionalcommit run . \
            -owner="${{ github.repository_owner }}" \
            -repo="${{ github.event.repository.name }}" \
            -pr="${{ steps.metadata.outputs.pr_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
