add_new_field_db:
  target: database/sql
  where:
    struct: DB
  do:
    - add_struct_fields:
        new_field:
          - name: Endpoint
            type: string
          - name: DbName
            type: string
          - name: DriverName
            type: string
          - name: DSN
            type: string

add_new_field_stmt:
  target: database/sql
  where:
    struct: Stmt
  do:
    - add_struct_fields:
        new_field:
          - name: Data
            type: map[string]string
          - name: DriverName
            type: string
          - name: DSN
            type: string

add_new_field_tx:
  target: database/sql
