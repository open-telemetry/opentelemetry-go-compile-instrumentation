add_new_field_db:
  where:
    target: database/sql
    struct: DB
  do:
    add_struct_fields:
      new_field:
        - name: Endpoint
          type: string
        - name: DbName
          type: string
        - name: DriverName
          type: string
        - name: DSN
          type: string

add_new_field_stmt:
  where:
    target: database/sql
    struct: Stmt
  do:
    add_struct_fields:
      new_field:
        - name: Data
          type: map[string]string
        - name: DriverName
          type: string
        - name: DSN
          type: string

add_new_field_tx:
  where:
    target: database/sql
    struct: Tx
  do:
