hook_open:
  where:
    target: database/sql
    func: Open
  do:
    inject_hooks:
      before: beforeOpenInstrumentation
      after: afterOpenInstrumentation
      path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/pkg/instrumentation/databasesql"

