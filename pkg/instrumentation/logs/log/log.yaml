# Instrumentation for log to inject trace context into log messages

hook_log_output:
  target: log
  func: output
  recv: "*Logger"
  before: BeforeLogOutput
  path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/pkg/instrumentation/logs/log"
