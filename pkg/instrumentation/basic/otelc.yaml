hook_helloworld:
  target: main
  where:
    func: Example
  do:
    - inject_hooks:
        before: MyHookBefore
        path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/pkg/instrumentation/basic"

add_new_field:
  target: main
  where:
    struct: MyStruct
  do:
    - add_struct_fields:
        new_field:
          - name: NewField
            type: string
          - name: ctx
            type: context.Context
  imports:
    context: "context"

raw_helloworld:
  target: main
  where:
    func: Example
  do:
    - inject_code:
        raw: |
          go func(){
            h := sha256.New()
            h.Write([]byte("RawCode"))
            fmt.Printf("RawCode: %x\n", h.Sum(nil))
          }()
  imports:
    fmt: "fmt"
    sha256: "crypto/sha256"

hook_recv:
  target: main
  where:
    func: Example
    recv: "*MyStruct"
  do:
    - inject_hooks:
        before: MyHook1Before
        after: MyHook1After
        path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/pkg/instrumentation/basic"

hook_no_recv:
  target: main
  where:
    func: Example2
    recv: "MyStruct"
  do:
    - inject_hooks:
        before: MyHook2Before
        path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/pkg/instrumentation/basic"

version_range:
  target: golang.org/x/time/rate
  version: "v0.14.0,v0.15.0"
  where:
    func: Every
  do:
    - inject_code:
        raw: |
          fmt.Println("Every1 from fmt")
  imports:
    fmt: "fmt"

version_min_bad:
  target: golang.org/x/time/rate
  version: "v0.15.0"
  where:
    func: Every
  do:
    - inject_code:
