hook_helloworld:
  where:
    target: main
    func: Example
  do:
    inject_hooks:
      before: MyHookBefore
      path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/pkg/instrumentation/basic"

add_new_field:
  where:
    target: main
    struct: MyStruct
  do:
    add_struct_fields:
      new_field:
        - name: NewField
          type: string
        - name: ctx
          type: context.Context
  imports:
    context: "context"

raw_helloworld:
  where:
    target: main
    func: Example
  do:
    inject_code:
      raw: |
        go func(){
          h := sha256.New()
          h.Write([]byte("RawCode"))
          fmt.Printf("RawCode: %x\n", h.Sum(nil))
        }()
  imports:
    fmt: "fmt"
    sha256: "crypto/sha256"

hook_recv:
  where:
    target: main
    func: Example
    recv: "*MyStruct"
  do:
    inject_hooks:
      before: MyHook1Before
      after: MyHook1After
      path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/pkg/instrumentation/basic"

hook_no_recv:
  where:
    target: main
    func: Example2
    recv: "MyStruct"
  do:
    inject_hooks:
      before: MyHook2Before
      path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/pkg/instrumentation/basic"

version_range:
  where:
    target: golang.org/x/time/rate
    version: "v0.14.0,v0.15.0"
    func: Every
  do:
    inject_code:
      raw: |
        fmt.Println("Every1 from fmt")
  imports:
    fmt: "fmt"

version_min_bad:
  where:
    target: golang.org/x/time/rate
    version: "v0.15.0"
    func: Every
  do:
    inject_code:
      raw: |
        fmt.Println("Every2 from fmt")
  imports:
    fmt: "fmt"

version_min_good:
  where:
    target: golang.org/x/time/rate
    version: "v0.11.0"
    func: Every
  do:
    inject_code:
      raw: |
        fmt.Println("Every3 from fmt")
  imports:
    fmt: "fmt"

