mongodb_hook_connect:
  target: go.mongodb.org/mongo-driver/mongo
  func: Connect
  before: BeforeConnect
  path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/pkg/instrumentation/mongodb"

mongodb_hook_newclient:
  target: go.mongodb.org/mongo-driver/mongo
  func: NewClient
  before: BeforeNewClient
  path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/pkg/instrumentation/mongodb"
