# OpenTelemetry Demo Infrastructure
# Complete observability stack with Jaeger, Prometheus, OTel Collector, Grafana, and k6

services:
  # Jaeger - Distributed tracing backend (v2 with native OTLP support + SPM)
  jaeger:
    image: jaegertracing/jaeger:2.19.0@sha256:ede4864215be4cd85bd8c3129a2fea6c5713c5653c7282c429dba123014bc68b
    container_name: jaeger
    command:
      - --config=/etc/jaeger/config.yaml
    volumes:
      - ./jaeger/config.yaml:/etc/jaeger/config.yaml:ro
      - ./jaeger/ui-config.json:/etc/jaeger/ui-config.json:ro
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317"  # OTLP gRPC (internal)
      - "4318"  # OTLP HTTP (internal)
      - "14269:8888"  # Internal telemetry metrics (Jaeger's port 8888 mapped to host 14269)
      - "13133"  # Health check endpoint (internal)
    networks:
      - observability
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus - Metrics backend with native OTLP support (v3)
  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
      - --web.enable-otlp-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenTelemetry Collector - Receives, processes, and exports telemetry
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.155.0@sha256:4935caa35e9a4cb387e35732e8fb22b2b5759af8d12e7043357f03837f6e8df5
    container_name: otel-collector
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
      - "--feature-gates=-telemetry.UseLocalHostAsDefaultMetricsAddress"  # Expose metrics on 0.0.0.0
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC receiver
      - "4318:4318"  # OTLP HTTP receiver
      - "8888:8888"  # Collector internal telemetry metrics
      - "8889:8889"  # Application metrics + spanmetrics
      - "13133:13133"  # Health check endpoint
    networks:
      - observability
    depends_on:
      jaeger:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    restart: unless-stopped

  # Grafana - Visualization and dashboards
  grafana:
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - observability
    depends_on:
      - prometheus
      - jaeger
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # gRPC Server - Demo application with compile-time instrumentation
  grpc-server:
    build:
      context: ../../..
      dockerfile: demo/app/grpc/server/Dockerfile
    container_name: grpc-server
    ports:
      - "50051:50051"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=grpc-server
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=demo,service.version=1.0.0
      - OTEL_LOG_LEVEL=info
    networks:
      - observability
    depends_on:
      - otel-collector
    restart: unless-stopped

  # gRPC Client - Demo client making requests to server
  grpc-client:
    build:
      context: ../../..
      dockerfile: demo/app/grpc/client/Dockerfile
    container_name: grpc-client
    command: ["-addr", "grpc-server:50051", "-name", "demo-client", "-count", "10000"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=grpc-client
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=demo,service.version=1.0.0
      - OTEL_LOG_LEVEL=info
    networks:
      - observability
    depends_on:
      - grpc-server
      - otel-collector
    restart: unless-stopped

  # HTTP Server - Demo HTTP application with compile-time instrumentation
  http-server:
    build:
      context: ../../..
      dockerfile: demo/app/http/server/Dockerfile
    container_name: http-server
    ports:
      - "8080:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=http-server
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=demo,service.version=1.0.0
      - OTEL_LOG_LEVEL=info
    networks:
      - observability
    depends_on:
      - otel-collector
    restart: unless-stopped

  # HTTP Client - Demo client making requests to HTTP server
  http-client:
    build:
      context: ../../..
      dockerfile: demo/app/http/client/Dockerfile
    container_name: http-client
    command: ["-addr", "http://http-server:8080", "-count", "10000", "-method", "GET"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=http-client
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=demo,service.version=1.0.0
      - OTEL_LOG_LEVEL=info
    networks:
      - observability
    depends_on:
      - http-server
      - otel-collector
    restart: unless-stopped

  # MySQL - Database backend for DB demo
  mysql:
    image: mysql:9.7@sha256:ad88e1c86cbf12ef52d0a0360cd4b774d22956c5ee9c565645fb019d7aacb6c3
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=demodb
      - MYSQL_USER=demo
      - MYSQL_PASSWORD=demo
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - observability
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # DB Server - Demo HTTP server with MySQL backend and compile-time instrumentation
  db-server:
    build:
      context: ../../..
      dockerfile: demo/app/db/server/Dockerfile
    container_name: db-server
    ports:
      - "8081:8081"
    command: ["-port", "8081", "-dsn", "demo:demo@tcp(mysql:3306)/demodb?parseTime=true"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=db-server
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=demo,service.version=1.0.0
      - OTEL_LOG_LEVEL=info
    networks:
      - observability
    depends_on:
      mysql:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  # Redis - In-memory data store for Redis demo
  redis:
    image: redis:8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - observability
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Client - Demo client making requests to Redis
  redis-client:
    build:
      context: ../../..
      dockerfile: demo/app/redis/client/Dockerfile
    container_name: redis-client
    command: ["-addr", "redis:6379", "-count", "10000"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=redis-client
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=demo,service.version=1.0.0
      - OTEL_LOG_LEVEL=info
    networks:
      - observability
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  # DB Client - Demo client making CRUD requests to DB server
  db-client:
    build:
      context: ../../..
      dockerfile: demo/app/db/client/Dockerfile
    container_name: db-client
    command: ["-addr", "http://db-server:8081", "-count", "10000"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=db-client
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=demo,service.version=1.0.0
      - OTEL_LOG_LEVEL=info
    networks:
      - observability
    depends_on:
      - db-server
      - otel-collector
    restart: unless-stopped

  # k6 gRPC Load Testing - Generates continuous load against gRPC server
  k6-grpc:
    image: grafana/k6:2.1.0@sha256:65c920dc067d5e2e00befbf982af6ad6ad0117034e8b1c65817c7975c52d4669
    container_name: k6-grpc
    command: run --quiet /scripts/grpc-load-test.js
    volumes:
      - ./k6:/scripts:ro
      - ../../grpc/server/greeter.proto:/proto/greeter.proto:ro
    networks:
      - observability
    depends_on:
      - grpc-server
    profiles:
      - load-testing
    environment:
      - K6_OUT=json=/tmp/k6-grpc-results.json
    restart: unless-stopped

  # k6 HTTP Load Testing - Generates continuous load against HTTP server
  k6-http:
    image: grafana/k6:2.1.0@sha256:65c920dc067d5e2e00befbf982af6ad6ad0117034e8b1c65817c7975c52d4669
    container_name: k6-http
    command: run --quiet /scripts/http-load-test.js
    volumes:
      - ./k6:/scripts:ro
    networks:
      - observability
    depends_on:
      - http-server
    profiles:
      - load-testing
    environment:
      - K6_OUT=json=/tmp/k6-http-results.json
    restart: unless-stopped

networks:
  observability:
    driver: bridge
    name: otelc-demo-network

# Note: No volumes defined for ephemeral demo environment
# Data will be lost when containers are stopped
# For persistent data, uncomment and add volumes:
# volumes:
#   prometheus-data:
#   grafana-data:
#   jaeger-data:
