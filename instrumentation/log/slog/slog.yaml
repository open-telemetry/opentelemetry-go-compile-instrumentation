# Instrumentation for log/slog to inject trace context into log messages

hook_slog_log:
  target: log/slog
  where:
    func: log
    recv: "*Logger"
  do:
    - inject_hooks:
        before: BeforeSlogLog
        path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/instrumentation/log/slog"

hook_slog_new_record:
  target: log/slog
  where:
    func: NewRecord
  do:
    - inject_hooks:
        after: AfterSlogNewRecord
        path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/instrumentation/log/slog"
