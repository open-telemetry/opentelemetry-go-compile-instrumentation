# Instrumentation for log/slog to inject trace context into log records as structured attributes

hook_slog_new_record:
  target: log/slog
  where:
    func: NewRecord
  do:
    - inject_hooks:
        after: AfterSlogNewRecord
        path: "github.com/open-telemetry/opentelemetry-go-compile-instrumentation/instrumentation/log/slog"
