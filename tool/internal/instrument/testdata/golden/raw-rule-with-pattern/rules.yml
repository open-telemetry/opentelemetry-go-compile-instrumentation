func1_first_match:
  target: main
  where:
    func: func1
    pattern: "^println\\(\", World!\"\\)$"
  do:
    - inject_code:
        raw: "print(\"Hello\")"


func2_inside_goroutine:
  target: main
  where:
    func: func2
    pattern: "^println\\(\"goroutine!\"\\)$"
  do:
    - inject_code:
        raw: "print(\"Inside goroutine\")"

func2_before_go:
  target: main
  where:
    func: func2
    pattern: "^go func\\(\\) \\{"
  do:
    - inject_code:
        raw: "print(\"Before go func\")"

func3_before_select:
  target: main
  where:
    func: func3
    pattern: "^select \\{"
  do:
    - inject_code:
        raw: "print(\"Before select\")"

func4_if_block:
  target: main
  where:
    func: func4
    pattern: "^println\\(\"IF BLOCK\"\\)$"
  do:
    - inject_code:
        raw: "print(\"Inside if\")"

func5_loop_match:
  target: main
  where:
    func: func5
    pattern: "^println\\(\"loop\"\\)$"
  do:
