generic_func_rule:
  target: main
  where:
    func: GenericFunc
  do:
    - inject_hooks:
        before: GenericFuncBefore
        after: GenericFuncAfter
        path: testdata

generic_method_rule:
  target: main
  where:
    func: GenericMethod
    recv: "*GenStruct"
  do:
    - inject_hooks:
        before: GenericMethodBefore
        after: GenericMethodAfter
        path: testdata
