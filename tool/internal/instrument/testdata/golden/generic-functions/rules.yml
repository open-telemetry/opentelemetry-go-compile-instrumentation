generic_func_rule:
  where:
    target: main
    func: GenericFunc
  do:
    inject_hooks:
      before: GenericFuncBefore
      after: GenericFuncAfter
      path: testdata

generic_method_rule:
  where:
    target: main
    func: GenericMethod
    recv: "*GenStruct"
  do:
    inject_hooks:
      before: GenericMethodBefore
      after: GenericMethodAfter
      path: testdata
