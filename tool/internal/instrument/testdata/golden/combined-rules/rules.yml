hook_func:
  where:
    target: main
    func: Func1
  do:
    inject_hooks:
      before: H1Before
      after: H1After
      path: testdata

add_field:
  where:
    target: main
    struct: T
  do:
    add_struct_fields:
      new_field:
        - name: NewField
          type: string

add_raw:
  where:
    target: main
    func: Func1
  do:
    inject_code:
      raw: "_ = 789"

add_file:
  where:
    target: main
  do:
    add_file:
      file: newfile.go
      path: testdata
